apiVersion: 1

datasources:
  - name: Phoenix Postgres
    uid: phoenix-postgres
    type: postgres
    access: proxy
    url: postgres:5432
    user: $PHOENIX_POSTGRES_GRAFANA_USER
    secureJsonData:
      password: $PHOENIX_POSTGRES_GRAFANA_PASSWORD
    jsonData:
      database: $PHOENIX_POSTGRES_DB
      sslmode: disable
      postgresVersion: 1600
      timescaledb: false
    editable: false

  # Prometheus datasource. Points at the in-stack Prometheus server (which
  # scrapes the host's /metrics and evaluates alerts), NOT at Phoenix's
  # internal :9090 — that endpoint is a scrape source, not a queryable
  # Prometheus API, so the old `http://phoenix:9090` config could never serve
  # PromQL. Phoenix Postgres above stays for trace correlation.
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
