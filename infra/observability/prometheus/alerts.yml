# Prometheus alerting rules for the agent platform.
#
# These are the carrier for the alert thresholds documented in
# docs/RUNBOOK.md §2 — RUNBOOK is the human-readable rationale, this file is
# what Prometheus actually evaluates. Keep the two in sync.
#
# BRAND PREFIX: metric names use the default `agentdesk_` prefix (METRIC_PREFIX
# in src/branding.ts, derived from BRAND_NAMESPACE). After a rebrand the host
# emits `<new_namespace>_*` instead — replace every `agentdesk_` below to match,
# or the rules silently never fire.

groups:
  - name: agentdesk-platform
    rules:
      # Inbound fully stopped: Feishu webhook down / service down / network.
      - alert: AgentDeskInboundSilent
        expr: rate(agentdesk_inbound_total{outcome="accepted"}[10m]) == 0
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: No inbound messages accepted for 10m
          description: >-
            agentdesk_inbound_total{outcome="accepted"} rate is flat zero.
            Feishu webhook delivery, the host process, or the network is down.
            See RUNBOOK §3.1.

      # Route latency degraded: DB lock, disk IO, slow container startup.
      - alert: AgentDeskRouteSlow
        expr: histogram_quantile(0.95, rate(agentdesk_route_seconds_bucket{phase="route"}[5m])) > 1.0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Route p95 latency above 1s
          description: >-
            routeInbound p95 exceeded 1s for 5m. Suspect central-DB lock
            contention, disk IO, or back-pressure. See RUNBOOK §3.

      # Wake latency degraded: slow Docker daemon, image problems.
      - alert: AgentDeskWakeSlow
        expr: histogram_quantile(0.95, rate(agentdesk_route_seconds_bucket{phase="wake"}[5m])) > 5.0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Container wake p95 latency above 5s
          description: >-
            wakeContainer p95 exceeded 5s for 5m. Docker daemon slow, image
            pull/build issue, or host resource pressure. See RUNBOOK §3.2.

      # Capacity saturated: MAX_CONCURRENT_CONTAINERS hit repeatedly.
      - alert: AgentDeskCapacitySaturated
        expr: rate(agentdesk_wake_rejected_total[10m]) > 0.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Container wake requests being rejected (capacity)
          description: >-
            agentdesk_wake_rejected_total rate sustained above 0.5/s.
            MAX_CONCURRENT_CONTAINERS is saturated. See RUNBOOK §3.2.

      # Classification protocol failing: frontdesk LLM skipping classify_intent.
      - alert: AgentDeskClassificationBypass
        expr: rate(agentdesk_classification_bypass_total[15m]) > 0.1
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: Frontdesk classify_intent protocol being bypassed
          description: >-
            agentdesk_classification_bypass_total rate above 0.1/s for 30m.
            Frontdesk is routing without a matching classify_intent call —
            prompt drift or model regression. See RUNBOOK §3.3.

      # Audit write failing: classification rows being dropped.
      - alert: AgentDeskClassificationLogFailing
        expr: rate(agentdesk_classification_log_failures_total[5m]) > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: Classification log writes are failing
          description: >-
            agentdesk_classification_log_failures_total is non-zero. The
            classification regression corpus is losing rows — investigate the
            central-DB write path immediately. See RUNBOOK §3.3.

      # Provider error rate: LLM gateway down / quota exhausted.
      - alert: AgentDeskProviderErrors
        expr: rate(agentdesk_provider_errors_total[5m]) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Container-provider error rate elevated
          description: >-
            agentdesk_provider_errors_total rate above 0.5/s for 5m. LLM
            gateway down, quota exhausted, or provider auth broken.

      # Container crash storm: image problem / system resources.
      - alert: AgentDeskContainerCrashing
        expr: rate(agentdesk_container_exits_total{outcome="crash"}[10m]) > 0.2
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: Agent containers crash-looping
          description: >-
            agentdesk_container_exits_total{outcome="crash"} rate above 0.2/s
            for 10m. Image regression, OOM, or host resource exhaustion.
            See RUNBOOK §3.4.

      # Delivery exhaustion: messages dead-lettered after retries (ADR-0016).
      - alert: AgentDeskDeliveryPermanentFailures
        expr: rate(agentdesk_delivery_permanent_failures_total[15m]) > 0
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: Outbound messages being permanently dropped (DLQ)
          description: >-
            agentdesk_delivery_permanent_failures_total is non-zero. Outbound
            messages exhausted their retry budget and sit in the session
            delivered table with status='failed'. Inspect/requeue via
            scripts/dlq.ts.

      # Identity trust-chain alarm: container-claimed origin failed host-side
      # cross-validation (ADR-0017). Any non-zero rate is security-relevant.
      - alert: AgentDeskA2aOriginRejected
        expr: rate(agentdesk_a2a_origin_rejected_total[15m]) > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: A2a origin_user_id failed host cross-validation
          description: >-
            agentdesk_a2a_origin_rejected_total is non-zero. Either a
            prompt-injected agent attempted impersonation or a legitimate emit
            path is stamping unverifiable identities. Both require
            investigation. See ADR-0017.

      # Worker routing feedback (ADR-0040): a worker is persistently NACKing the
      # work it receives. The platform RECORDS nacks but does NOT reroute, so a
      # sustained per-worker nack rate means the work is being dropped unless the
      # worker also replies — usually broken routing wiring (frontdesk keeps
      # mis-delegating to it) or a prompt-injection probe. Threshold is a starting
      # point; tune per deployment. Misroute feedback is benign signal, analyzed
      # from classification_log, not alerted.
      - alert: AgentDeskWorkerNackingPersistently
        expr: sum by (reported_by) (rate(agentdesk_routing_feedback_total{kind="nack"}[30m])) > 0.01
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: A worker is NACKing its delegated work persistently
          description: >-
            agentdesk_routing_feedback_total{kind="nack"} is sustained for
            {{ $labels.reported_by }}. The platform records nacks but does NOT
            reroute (ADR-0040) — so this work is dropped unless the worker also
            replies. Likely broken routing wiring (frontdesk mis-delegating) or a
            prompt-injection probe. Inspect classification_log for this
            agent_group_id. See RUNBOOK §3.12.

      # Inbound silently parked: envelope persisted to the recovery ledger
      # (ADR-0022) but routeInbound threw — the user's message was accepted but
      # never reached a session. Recoverable only via scripts/replay-inbound.ts.
      # NOTE: also fires post-restart with the __startup_backlog__ label when a
      # standing failed backlog is re-surfaced — that IS worth paging.
      - alert: AgentDeskInboundIngressFailing
        expr: rate(agentdesk_inbound_ingress_failed_total[10m]) > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: Inbound messages failed to route after being persisted
          description: >-
            agentdesk_inbound_ingress_failed_total is non-zero. A message was
            accepted + persisted to the ingress ledger but routeInbound threw,
            so it sits at status='failed' and was never delivered to a session.
            Inspect/replay via scripts/replay-inbound.ts. See RUNBOOK §3.7.

      # Inbound dead-lettered: a container repeatedly crashed/was-killed on a
      # message until MAX_TRIES sweep resets exhausted it. The inbound mirror of
      # the outbound DLQ — the user's request is dropped and never re-polled.
      - alert: AgentDeskInboundProcessingPermanentFailures
        expr: rate(agentdesk_inbound_processing_permanent_failures_total[15m]) > 0
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: Inbound messages permanently dropped after retry exhaustion
          description: >-
            agentdesk_inbound_processing_permanent_failures_total is non-zero.
            An inbound message exhausted its container-processing retries and is
            parked at messages_in.status='failed' (never re-polled). Inspect a
            crash-looping worker; requeue via scripts/requeue-inbound.ts.
            See RUNBOOK §3.7.

      # Identity trust-chain alarm: the host signing proxy (ADR-0034) refused to
      # sign because a container's request body claimed a DIFFERENT agent group
      # than its token is bound to — an impersonation signal.
      - alert: AgentDeskGatewaySigningImpersonation
        expr: rate(agentdesk_gateway_signing_proxy_total{outcome="identity_mismatch"}[15m]) > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: Signing proxy rejected a cross-group impersonation attempt
          description: >-
            agentdesk_gateway_signing_proxy_total{outcome="identity_mismatch"}
            is non-zero. A proxy-mode container tried to get the host to sign a
            request claiming another agent group. Investigate for prompt
            injection. See ADR-0034, RUNBOOK §3.8.

      # Signing proxy fail-closed: a group has no host-side signing key, so its
      # proxied gateway calls 502 — backend access is broken for that group.
      - alert: AgentDeskGatewaySigningFailClosed
        expr: rate(agentdesk_gateway_signing_proxy_total{outcome="no_signing_key"}[15m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Signing proxy cannot sign — no key for the group
          description: >-
            agentdesk_gateway_signing_proxy_total{outcome="no_signing_key"} is
            non-zero. The signing proxy is enabled but a group has no host-side
            signingKey, so its gateway calls fail closed (502). Configure the
            key via scripts/configure-enterprise-gateway.ts. See RUNBOOK §3.8.

      # Unsigned backend gateways: a group has a baseUrl but no signingKey, so
      # its backend requests go out UNSIGNED and are forgeable (ADR-0018).
      - alert: AgentDeskUnsignedGateways
        expr: agentdesk_gateway_unsigned_groups > 0
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: Agent groups calling the backend gateway unsigned
          description: >-
            agentdesk_gateway_unsigned_groups > 0. A group has a gateway baseUrl
            but no HMAC signingKey — anything that can reach the backend can
            forge its requests. Provision a key via
            scripts/configure-enterprise-gateway.ts. See RUNBOOK §3.8.

      # Base agent image missing at boot: the host stays up by design (channels
      # + /metrics keep serving) but NO agent can spawn, so every inbound message
      # will fail. Signal is set by the boot precheck (checkBaseImage); refreshed
      # on host restart.
      - alert: AgentDeskBaseImageMissing
        expr: agentdesk_agent_base_image_present == 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Base agent image not built — agents cannot spawn
          description: >-
            agentdesk_agent_base_image_present == 0. The host booted without the
            base agent image present locally, so every session wake fails with
            "No such image". Run `pnpm container:build` and restart the host. A
            common cause is skipping the build step after init:enterprise.

      # Broken agent regex: an engage_pattern failed to compile, so that agent
      # is fail-closed and silently dropping ALL its inbound (ADR-0019).
      - alert: AgentDeskEngagePatternInvalid
        expr: rate(agentdesk_engage_pattern_invalid_total[10m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: An agent engage_pattern regex failed to compile
          description: >-
            agentdesk_engage_pattern_invalid_total is non-zero. An agent's
            engage_pattern did not compile; that agent is fail-closed and
            dropping all inbound until the regex is fixed. See RUNBOOK §3.9.

      # Repeated approval-card rejections on operator identity (ADR-0019
      # fail-closed). A trickle is normal (a stale card, the wrong person
      # clicking); a sustained rate means a misconfigured card audience or
      # someone repeatedly trying to action another user's approval card.
      # Other fail-closed policies share agentdesk_policy_check_failed_total
      # (command_gate, engage_pattern) but are routine, so are not alerted here.
      - alert: AgentDeskApprovalIdentityRejections
        expr: rate(agentdesk_policy_check_failed_total{policy="approval_operator_identity"}[15m]) > 0
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: Approval-card actions repeatedly rejected on operator identity
          description: >-
            agentdesk_policy_check_failed_total{policy="approval_operator_identity"}
            has been non-zero for 15m. Card actions are being fail-closed because
            the operator is unverified (reason="absent") or doesn't match the
            card's intended user (reason="mismatch"). Check for a wrong card
            audience or an attempt to action someone else's approval. See
            RUNBOOK §3.11.

      # Unhandled promise rejection: a promise error escaped its call site. The
      # host logs but does not crash on these — a non-zero rate means it may be
      # running in a half-completed state. Investigate the offending async path.
      - alert: AgentDeskUnhandledRejections
        expr: rate(agentdesk_unhandled_rejections_total[15m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Host caught unhandled promise rejections
          description: >-
            agentdesk_unhandled_rejections_total is non-zero. A promise error
            escaped its call site; the host logged it but kept running. Check
            host stderr for the 'Unhandled rejection' lines and fix the path.

      # Disk filling: session DBs + inbox attachments grow unbounded (whole-
      # session archival is opt-in/OFF by default). SQLITE_FULL across the three
      # DBs stalls everything; this is the early warning. for:10m covers the boot
      # window before the first sweep tick sets the gauge.
      - alert: AgentDeskDataDiskLow
        expr: agentdesk_data_dir_free_ratio < 0.10
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: DATA_DIR free space below 10%
          description: >-
            agentdesk_data_dir_free_ratio < 0.10. The data volume is filling —
            SQLITE_FULL will stall inbound/outbound once it's full. Enable
            session archival (AGENTDESK_SESSION_TTL_DAYS) and/or audit retention
            (AGENTDESK_AUDIT_RETAIN_DAYS), prune old archives, or grow the volume.
            See RUNBOOK §3.10.
      - alert: AgentDeskDataDiskCritical
        expr: agentdesk_data_dir_free_ratio < 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: DATA_DIR free space below 5%
          description: >-
            agentdesk_data_dir_free_ratio < 0.05. Imminent SQLITE_FULL — act now
            (free space / grow the volume). See RUNBOOK §3.10.

      # Signing-proxy audit write failing: best-effort intent/final writes hit a
      # central-DB error. The pre-forward intent is fail-closed (call refused),
      # but a finalize failure leaves a row mislabeled 'pending' — investigate
      # central-DB pressure (busy_timeout / disk).
      - alert: AgentDeskGatewaySigningAuditFailing
        expr: rate(agentdesk_gateway_signing_proxy_total{outcome="audit_write_failed"}[15m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Signing-proxy audit writes are failing
          description: >-
            agentdesk_gateway_signing_proxy_total{outcome="audit_write_failed"}
            is non-zero. The central DB is rejecting audit writes — pre-forward
            intents fail closed (signed call refused), finalize failures leave a
            'pending' row. Check DB pressure / disk. See RUNBOOK §3.8.
